# ticket_guy_b_team 用の Codex 設定。
# 既定モデルに加えて、マルチエージェント運用で必要になる役割、
# 成果物配置、品質ゲート、停止条件を明示する。

model = "gpt-5.4"
model_reasoning_effort = "medium"

[project]
name = "ticket_guy_b_team"
language = "ja"
primary_interface = "cli"
spec_path = "doc/spec.md"
todo_path = "doc/todo.md"

[features]
multi_agent = true
spec_review_flow = true
ticket_driven_execution = true
auto_acceptance_gates = true
human_in_the_loop_for_exceptions = true

[execution]
default_agent_role = "root"
max_parallel_workers = 4
require_approved_spec_for_implementation = true
require_explicit_dependencies = true
require_observable_acceptance_criteria = true

[artifacts]
root_dir = "artifacts"
plans_dir = "artifacts/plans"
tickets_dir = "artifacts/tickets"
reviews_dir = "artifacts/reviews"
logs_dir = "artifacts/logs"

[quality_gates]
run_tests = true
run_type_check = true
run_lint = false
require_verification_section = true
block_on_failed_checks = true

[quality_gates.commands]
tests = ".venv/bin/python -m pytest"
type_check = ".venv/bin/python -m pyright"

[escalation]
stop_on_spec_gap = true
stop_on_missing_acceptance_criteria = true
stop_on_unresolved_dependency = true
stop_on_non_mechanical_verification = true
report_path = "artifacts/reviews/escalations.md"

[prompts]
root = ".codex/prompts/root.md"
worker = ".codex/prompts/worker.md"
review = ".codex/prompts/review.md"
integration = ".codex/prompts/integration.md"

[agents.default]
model = "gpt-5.4-mini"
reasoning_effort = "medium"
language = "ja"

[agents.roles.root]
prompt = ".codex/prompts/root.md"
model = "gpt-5.4"
reasoning_effort = "high"
allowed_ticket_types = ["root", "worker", "review", "integration"]
responsibilities = [
  "spec_alignment",
  "ticket_breakdown",
  "dependency_management",
  "escalation_control",
]

[agents.roles.worker]
prompt = ".codex/prompts/worker.md"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
allowed_ticket_types = ["worker"]
responsibilities = [
  "implementation",
  "local_verification",
  "artifact_generation",
]

[agents.roles.review]
prompt = ".codex/prompts/review.md"
model = "gpt-5.4-mini"
reasoning_effort = "medium"
allowed_ticket_types = ["review"]
responsibilities = [
  "spec_conformance_review",
  "acceptance_review",
  "risk_reporting",
]

[agents.roles.integration]
prompt = ".codex/prompts/integration.md"
model = "gpt-5.4"
reasoning_effort = "medium"
allowed_ticket_types = ["integration"]
responsibilities = [
  "artifact_integration",
  "interface_validation",
  "post_integration_verification",
]
