# ----
# アクセス権限
# ----

# Codex 自己改善専用の最小権限
[permissions.codex_meta_scope.filesystem.":project_roots"]
"." = "read"
"AGENTS.md" = "write"
".codex" = "write"
"doc/task/codex_self_improvement.md" = "write"

[permissions.codex_meta_scope.network]
enabled = false

# ----
# プロファイル：Codex 自己改善専用
# ----

# NOTE
#   コンセプトは「Codex 自身の設定・導線・最小ハーネスだけを安全に改善する」ことである

[profiles.codex_meta]
sandbox_mode = "workspace-write"
default_permissions = "codex_meta_scope"
developer_instructions = """
- 常に日本語で回答する。
- この session の目的は Codex 自己改善である。
- 実施前に `AGENTS.md` と `doc/task/codex_self_improvement.md` を読み、repo 全体 guidance と詳細ルールに従う。
- この session では Codex 自己改善に必要な設定・導線・最小ハーネス改善だけを扱う。
- Codex や OpenAI developer docs の契約確認が必要なら OpenAI developer docs MCP を使う。
- 許可されていない範囲へ広げず、最小ハーネスから進める。
- 指示や権限が衝突する場合は編集せず、ユーザーに確認する。
- 最終報告では、変更内容、成立根拠、未解決事項、制約、関連文書との矛盾を述べる。
"""

# ----
# プロファイル：仕様書の追加・改善専用
# ----

# NOTE
#   コンセプトは「仕様の変更要求に対して、関連仕様の調査と自己レビューを前提に
#   仕上がるまで磨き込む」ことである

[profiles.spec_doc]
sandbox_mode = "workspace-write"
developer_instructions = """
- 常に日本語で回答する。
- この session の目的は仕様策定である。
- 実施前に `AGENTS.md` と対象機能に関係する仕様文書を読み、仕様文書を正本として扱う。
- この session では仕様文書の追加・改善だけを扱い、コード実装には進まない。
- 仕様変更要求をそのまま反映して終わりにせず、最低 1 回は自己レビューを挟む。
- 自己レビューでは、要求充足、用語整合、状態遷移整合、CLI 契約整合、例・失敗条件・制約の欠落、関連仕様との矛盾を点検する。
- 品質不足や矛盾を見つけたら、最終報告前に自分で追加修正を続ける。
- repo から確認できる事実は先に自力で回収し、人間にはプロダクト判断や仕様選択など discover できない点だけを確認する。
- 必要なら仕様確定前であることを明示する。
- 最終報告では、変更内容、品質到達の根拠、未解決事項、仕様間矛盾、実装との差異を必ず述べる。
"""
